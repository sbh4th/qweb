- key: li2022c
  category: ARTICLE
  title: Field Measurements of Indoor and Community Air Quality in Rural Beijing before,
    during, and after the COVID-19 Lockdown
  citation: 'Li X, Baumgartner J, **Harper S**, Zhang X, Sternbach T, Barrington-Leigh
    C, Brehmer C, Robinson B, Shen G, Zhang Y, Tao S, Carter E. "Field Measurements
    of Indoor and Community Air Quality in Rural Beijing before, during, and after
    the COVID-19 Lockdown" _Indoor Air_. 2022; 32: e13095. DOI: [10.1111/ina.13095](https://doi.org/10.1111/ina.13095)
    Citations: 18'
  doi: 10.1111/ina.13095
  url: https://doi.org/10.1111/ina.13095
  url_scholar: https://scholar.google.com/citations?view_op=view_citation&hl=en&user=Ipf8idcAAAAJ&citation_for_view=Ipf8idcAAAAJ:O0nohqN1r9EC
  cites: 18
  abstract: The coronavirus (COVID-19) lockdown in China is thought to have reduced
    air pollution emissions due to reduced human mobility and economic activities.
    Few studies have assessed the impacts of COVID-19 on community and indoor air
    quality in environments with diverse socioeconomic and household energy use patterns.
    The main goal of this study was to evaluate whether indoor and community air pollution
    differed before, during, and after the COVID-19 lockdown in homes with different
    energy use patterns. Using calibrated real-time PM2.5 sensors, we measured indoor
    and community air quality in 147 homes from 30 villages in Beijing over 4 months
    including periods before, during, and after the COVID-19 lockdown. Community pollution
    was higher during the lockdown (61 \textpm{} 47 {$\mu$}g/m3) compared with before
    (45 \textpm{} 35 {$\mu$}g/m3, p {$<$} 0.001) and after (47 \textpm{} 37 {$\mu$}g/m3,
    p {$<$} 0.001) the lockdown. However, we did not observe significantly increased
    indoor PM2.5 during the COVID-19 lockdown. Indoor-generated PM2.5 in homes using
    clean energy for heating without smokers was the lowest compared with those using
    solid fuel with/without smokers, implying air pollutant emissions are reduced
    in homes using clean energy. Indoor air quality may not have been impacted by
    the COVID-19 lockdown in rural settings in China and appeared to be more impacted
    by the household energy choice and indoor smoking than the COVID-19 lockdown.
    As clean energy transitions occurred in rural households in northern China, our
    work highlights the importance of understanding multiple possible indoor sources
    to interpret the impacts of interventions, intended or otherwise.
