  title: Impact Evaluation of the TAMANI Project to Improve Maternal and Child Health
    in Tanzania
  citation: 'Hetherington E*, **Harper S**, Davidson R, Festo C, Lampkin N, Mtenga
    S, Teixeira C, Vincent I, Nandi A. "Impact Evaluation of the TAMANI Project to
    Improve Maternal and Child Health in Tanzania" _J Epidemiol Community Health_.
