  citation: '**Harper S**. "Would Stronger Seat Belt Laws Reduce Motor Vehicle Crash
    Deaths?: A Semi-Bayesian Analysis" _Epidemiology (Cambridge, Mass.)_. 2019; 30:
    380--387. DOI: [10.1097/EDE.0000000000000990](https://doi.org/10.1097/EDE.0000000000000990)
    Citations: 11'
