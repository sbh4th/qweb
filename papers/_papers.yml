  title: Do Cutaneous Human Papillomavirus Genotypes Affect Head and Neck Cancer?
    Evidence and Bias-Correction from a Case-Control Study
  citation: 'Al-Soneidar WA*, **Harper S**, Madathil SA, Schlecht NF, Nicolau B. "Do
    Cutaneous Human Papillomavirus Genotypes Affect Head and Neck Cancer? Evidence
    and Bias-Correction from a Case-Control Study" _Cancer Epidemiology_. 2022; 79:
    102205. DOI: [10.1016/j.canep.2022.102205](https://doi.org/10.1016/j.canep.2022.102205)
    Citations: 8'
  doi: 10.1016/j.canep.2022.102205
  url: https://doi.org/10.1016/j.canep.2022.102205
  url_scholar: https://scholar.google.com/citations?view_op=view_citation&hl=en&user=Ipf8idcAAAAJ&citation_for_view=Ipf8idcAAAAJ:PyEswDtIyv0C
  cites: 8
  abstract: 'Background Three genera of human papillomavirus (HPV) infect the oral
    cavity and oropharynx--- alpha ({$\alpha$}), beta ({$\beta$}) and gamma ({$\gamma$}).
    While {$\alpha$}-HPV infection is an established risk factor for head and neck
    cancers (HNC), the role of other genera remains unclear. We aimed to estimate
    the effect of {$\alpha$}-, {$\beta$}-, {$\gamma$}-HPV on HNC using a hospital-based
    case-control study. Methods We recruited incident HNC cases (396) and controls
    (439), frequency-matched by age and sex from four main referral hospitals in Montreal,
    Canada. We collected information on sociodemographic and behavior characteristics
    using in-person interviews, and tested rinse, brush and tumor specimens for HPV
    genotypes. We estimated adjusted odds ratios (aOR) and 95\% confidence intervals
    (CI) for the effect of HPV on HNC using logistic regression, adjusting for confounding.
    We conducted probabilistic bias analysis to account for potential exposure misclassification,
    selection bias, and residual confounding. Results {$\alpha$}-HPV genus had a strong
    effect on HNC, particularly HPV16 (aOR = 22.6; 95\% CI: 10.8, 47.2). {$\beta$}-HPV
    was more common among controls (aOR = 0.80; 95\% 0.57, 1.11). After adjustment
    for HPV16, we found weaker evidence for {$\gamma$}-HPV (aOR = 1.29; 95\% CI: 0.80,
    2.08). Combined bias analyses for HPV16 increased the strength of the point estimate,
    but added imprecision (aOR = 54.2, 95\%~CI: 10.7, 385.9). Conclusions {$\alpha$}-HPV,
    especially HPV16, appears to increase the risk for HNC, while there is little
    evidence for an effect of {$\beta$}- or {$\gamma$}-HPV. {$\beta$}-HPV may have
    a preventive effect, while {$\gamma$}-HPV may increase the risk of HNC, although
    to a lesser extent than that of {$\alpha$}-HPV. Results for cutaneous HPV were
    imprecise and less conclusive. Due to possible epidemiologic biases, the true
    relation between HPV and HNC could be underestimated in the literature. Further
    improvement in current methods and more studies of the biologic mechanisms of
    the three genera in HNC development are warranted.'
