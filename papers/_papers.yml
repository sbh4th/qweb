  title: Interaction of HPV16 and Cutaneous HPV in Head and Neck Cancer
  citation: 'Al-Soneidar WA*, **Harper S**, Alli BY, Nicolau B. "Interaction of HPV16
    and Cutaneous HPV in Head and Neck Cancer" _Cancers_. 2022; 14: 5197. DOI: [10.3390/cancers14215197](https://doi.org/10.3390/cancers14215197)
    Citations: 3'
