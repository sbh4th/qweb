  title: Subgroup Effects Should Be Examined Using Both Relative and Absolute Effect
    Measures
  citation: 'Socha P*, **Harper S**, Hutcheon JA. "Subgroup Effects Should Be Examined
    Using Both Relative and Absolute Effect Measures" _Australian and New Zealand
    Journal of Obstetrics and Gynaecology_. 2023; 63: 469--472. DOI: [10.1111/ajo.13656](https://doi.org/10.1111/ajo.13656)
    Citations: 3'
  doi: 10.1111/ajo.13656
  url: https://doi.org/10.1111/ajo.13656
  url_scholar: https://scholar.google.com/citations?view_op=view_citation&hl=en&user=Ipf8idcAAAAJ&citation_for_view=Ipf8idcAAAAJ:uVUOdF_882EC
  cites: 3
  abstract: Treatment effects can be measured on the relative scale (eg, risk ratios,
    odds ratios) or the absolute scale (eg, risk differences). If the baseline risk
    of an outcome is different between subgroups, the effect of the treatment will
    differ between subgroups on at least one scale (relative, absolute, or both).
    We illustrate this using two examples from the literature where only relative
    effects were estimated, but conclusions about subgroup differences would likely
    have changed had absolute effects also been considered. To identify all meaningful
    subgroup differences, researchers and clinicians should compare~effects on the
    relative and absolute scale.
