- id: kelleher2006
  abstract: >-
    We investigated the contribution of the large-scale immigration of White
    Europeans into the US between 1850 and 1930 to the timing and extent of the
    epidemic pattern of heart disease between 1900 and 1980. The analyses are
    based on data collected through the United States Federal Census from 1850
    to the present. The hardcopy historical record confirms that census reports
    themselves and related monographs were concerned from 1850 with excessive
    mortality from heart disease of immigrants, particularly of Northern
    European origin and initially at least, their first-generation native-born
    children. Our analysis of the electronic database indicates a strong
    relationship between the percentage of US population foreign born and native
    born of foreign parentage and age adjusted mortality from heart disease. We
    identified a lag of 50 years giving the maximum linear correlation
    coefficient for men ( r2 = 0.92), and for women a shorter lag of 38 years
    and an earlier decline in Coronary Heart Disease (CHD) rates ( r2 = 0.96).
    Both the rise and fall of the CHD epidemic over an 80-year period correspond
    closely to the rise and fall of the foreign population in previous years.
    For the foreign born only, age adjusted negative binomial general estimated
    equation (GEE) models calculate the relative risk of dying of heart disease
    per 10% increase in proportion foreign born. There is an independent
    influence for men until 1930 and for women throughout the period from 1910
    onwards. We conclude there is an impact of immigration on the pattern of the
    epidemic, mediated through a combination of factors, such as accumulated
    life-course susceptibility, deprived socio-economic conditions upon arrival,
    and the enthusiastic uptake of behaviours related to the classic risk
    factors of smoking, high saturated fat and salt diet. Our analysis provides
    a more contextualised understanding of the scale and timing of the epidemic
    of CHD in the US. © 2006 Elsevier Ltd. All rights reserved.
