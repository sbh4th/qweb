- id: harper2023
  abstract: >-
    Rigorous policy analysis is hard and fraught with many empirical challenges,
    which are often compounded for issues that are politically polarizing, such
    as gun policy in the United States. In this issue, Sharkey and Kang1 analyze
    over two decades worth of changes in US state-level gun policies and argue
    that they have been extremely successful in reducing gun deaths. Sharkey and
    Kang’s1 analysis has a number of commendable dimensions. They motivate their
    analysis with an important and timely policy question, which is whether
    changes in gun policies contributed to the decline in gun-related deaths
    during the period from 1991 to 2016. Although their primary focus is on
    estimates generated using a pooled outcome (all gun deaths) and a cumulative
    index of all state changes to gun laws, they helpfully provide separate
    estimates for several different classes of gun laws and examine their impact
    across different subsets of gun-related and nongun-related outcomes. They
    also conduct several sensitivity analyses (using an alternative database of
    laws, fixed effects, and instrumental variable analyses) to bolster the
    credibility of their causal claims, as well as providing the source code
    that was used to generate their figures and tables. These positive aspects
    notwithstanding, the preferred model specification and analytic framework
    that Sharkey and Kang1 use to generate their evidence also raise some
    important methodologic questions. © 2023 Lippincott Williams and Wilkins.
    All rights reserved.
