- id: ma2025a
  abstract: >-
    Chronic exposure to volatile organic compounds (VOCs) poses significant
    health risks, especially in rural households with prolonged winter occupancy
    and diverse emission sources. This study investigates the key influencing
    factors of indoor VOCs complexities in rural Beijing through an integrated
    analysis of environmental conditions, behavioral patterns, and energy
    consumption frameworks. Analyzing 320 air samples from 192 randomly selected
    households, we reveal that indoor VOC concentrations were significantly
    higher than outdoor levels, with C3-C4 alkanes/alkenes constituting the
    dominant fraction (62.1 %). A critical finding identifies liquefied
    petroleum gas (LPG) cooking as a significant contributor to indoor VOC
    burdens. Contrary to conventional assumptions, heating fuel type (coal,
    biomass, or clean energy) exhibited negligible influence on VOC levels,
    attributable to spatial configurations of combustion infrastructure: 90 % of
    coal-heated households utilized radiator systems that isolated stoves from
    living spaces, while biomass units were predominantly outdoor-operated,
    mitigating direct indoor emissions. Among all variables, CO2 concentration
    demonstrated the strongest statistical association with VOCs, showing
    significant correlations across all seven VOC categories. Elevated aromatic
    hydrocarbons and oxygenated VOCs (OVOCs) in smoking households underscore
    tobacco smoke as a persistent indoor pollutant source. These findings
    challenge energy transition narratives by emphasizing that spatial design of
    heating systems, rather than fuel type alone, critically governs indoor air
    quality. © 2025
