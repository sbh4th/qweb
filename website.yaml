- id: kopec2010
  abstract: >-
    Background: Computer simulation models are used increasingly to support
    public health research and policy, but questions about their quality
    persist. The purpose of this article is to review the principles and methods
    for validation of population-based disease simulation models. Methods. We
    developed a comprehensive framework for validating population-based chronic
    disease simulation models and used this framework in a review of published
    model validation guidelines. Based on the review, we formulated a set of
    recommendations for gathering evidence of model credibility. Results.
    Evidence of model credibility derives from examining: 1) the process of
    model development, 2) the performance of a model, and 3) the quality of
    decisions based on the model. Many important issues in model validation are
    insufficiently addressed by current guidelines. These issues include a
    detailed evaluation of different data sources, graphical representation of
    models, computer programming, model calibration, between-model comparisons,
    sensitivity analysis, and predictive validity. The role of external data in
    model validation depends on the purpose of the model (e.g., decision
    analysis versus prediction). More research is needed on the methods of
    comparing the quality of decisions based on different models. Conclusion. As
    the role of simulation modeling in population health is increasing and
    models are becoming more complex, there is a need for further improvements
    in model validation methodology and common standards for evaluating model
    credibility. © 2010 Kopec et al; licensee BioMed Central Ltd.
