  abstract: >-
    Background: In cardiovascular research, pre-hospital mortality represents an
    important potential source of selection bias. Inverse probability of
    censoring weights are a method to account for this source of bias. The
    objective of this article is to examine and correct for the inﬂuence of
    selection bias due to pre-hospital mortality on the relationship between
