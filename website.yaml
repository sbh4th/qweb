- id: hall2009
  abstract: >-
    Background: Low fruit and vegetable consumption is an important risk factor
    for chronic diseases, but for many (mainly developing) countries, no
    prevalence data have ever been published. This study presents data on the
    prevalence of low fruit and vegetable intake for 52 countries and for
    various sociodemographic groups and settings across these countries.
    Methods: Data from 196,373 adult participants from 52 countries taking part
    in the World Health Survey (2002-2003) were analyzed in the summer of 2008.
    Low fruit and vegetable consumption was defined according to the WHO
    guidelines of a minimum of five servings of fruits and/or vegetables daily.
    Results: Low fruit and vegetable consumption prevalence ranged from 36.6%
    (Ghana) to 99.2% (Pakistan) for men and from 38.0% (Ghana) to 99.3%
    (Pakistan) for women. Significant differences in the likelihood of low fruit
    and vegetable intake between men and women were found in 15 countries. The
    prevalence of low fruit and vegetable consumption tended to increase with
    age and decrease with income. Although urbanicity was not associated overall
    with low fruit and vegetable consumption, urban and rural differences were
    significant for 11 countries. Conclusions: Overall, 77.6% of men and 78.4%
    of women from the 52 mainly low- and middle-income countries consumed less
    than the minimum recommended five daily servings of fruits and vegetables.
    Baseline global information on low fruit and vegetable consumption obtained
    in this study can help policymakers worldwide establish interventions for
    addressing the global chronic disease epidemic. © 2009 American Journal of
    Preventive Medicine.
