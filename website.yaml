- id: bannon2025
  abstract: >-
    Background: Although increasing cigarette taxes is known to improve child
    survival, there are few data on their effect on socioeconomic inequalities
    in child mortality. We investigated the association between cigarette
    taxation and socioeconomic inequalities in mortality in children younger
    than 5 years (hereafter referred to as under-5 mortality) in low-income and
    middle-income countries (LMICs). Methods: This was a longitudinal ecological
    study. We linked country-level annual data on 94 LMICs, as defined by the
    World Bank, and annual data on under-5 mortality by wealth quintile from the
    UN Inter-agency Group for Child Mortality Estimation from 2008 to 2020. We
    used fixed-effect panel regression models to assess the association of
    cigarette taxes with absolute and relative inequalities in under-5 mortality
    by wealth quintile. Findings: Increasing total cigarette tax by
    10-percentage-points was associated with reduced under-5 mortality rates in
    all wealth quintiles. Raising total cigarette tax from 0·0–24·9% to
    25·0–74·9% and 75·0% or more of their total retail value was associated with
    3·8% (95% CI 0·2 to 7·3) and 7·6% (1·4 to 13·4) decreases in absolute
    inequality in under-5 mortality, respectively. This finding was mainly
    attributable to specific tax, which was associated with a 1·4% (0·3 to 2·6)
    reduction in absolute inequality for each 10-percentage-point increase. We
    estimated that raising total cigarette taxes to 75·0% or more in all 94
    LMICs could have averted 281 017 (196 916 to 362 301) under-5 deaths in
    2021. Interpretation: High cigarette taxes are associated with a large
    decrease in absolute inequality in child mortality in LMICs. These findings
    support raising cigarette taxes to the WHO-recommended 75% or more of the
    retail value to protect the poorest children. Funding: Swedish Research
    Council for Health, Working Life, and Welfare; Stiftelsen Riksbankens
    Jubileumsfond; European Union's Horizon 2020 Research and Innovation; and UK
    National Institute for Health and Care Research. © 2025 The Author(s).
    Published by Elsevier Ltd. This is an Open Access article under the CC BY
    4.0 license
