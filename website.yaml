- id: jahagirdar2021
  abstract: >-
    Increasing caregiving needs for family members has created pressure on
    prime-age workers. Combined with the ageing population, the demand for care
    related to illness and disability by relatives mean more of the workforce
    may have to consider caring needs (Bauer and Sousa-Poza, 2015). ‘Informal
    caregivers’ provide care generally without payment (Yoo
                  et al.
                  , 2004). In contrast to formal care, informal caregivers usually have a close relationship with the recipient: for example, siblings and adult children. Informal caregiving is considered a desirable option to meet support needs from several perspectives; these caregivers may be preferred by recipients relative to formal arrangements especially during severe acute illnesses. Caregivers may also feel a personal sense of responsibility to look after loved ones rather than defer to strangers (Fine, 2012) though this may depend on the individual’s needs and the available alternatives. Although men are starting to play an important role due to shifting social gender roles, the vast majority of informal caregivers are women who increasingly attempt to juggle caring with labour force participation (Carmichael
                  et al.
                  , 2008).
