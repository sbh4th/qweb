- id: al-soneidar2024a
  abstract: >-
    Background. Human papillomaviruses (HPVs) cause head and neck cancer (HNC),
    which is increasing in incidence in developed countries. We investigated the
    prevalence of alpha (α), beta (β), and gamma (γ) HPVs among HNC cases and
    controls, and their relationship with sociodemographic, behavioral, and oral
    health factors. Methods. We obtained oral rinse and brush samples from
    incident HNC cases (n = 369) and hospital-based controls (n = 439) and tumor
    samples for a subsample of cases (n = 121). We genotyped samples using
    polymerase chain reaction with PGMY09–PGMY11 primers and linear array for
    α-HPV and type-specific multiplex genotyping assay for β-HPV and γ-HPV.
    Sociodemographic and behavioral data were obtained from interviews. Results.
    The prevalence of α-, β-, and γ-HPV among controls was 14%, 56%, and 24%,
    respectively, whereas prevalence among cases was 42%, 50%, and 33%,
    respectively. Prevalence of α- and γ-HPV, but not β-HPV, increased with
    increase in sexual activity, smoking, and drinking habits. No HPV genus was
    associated with oral health. Tumor samples included HPV genotypes
    exclusively from the α-genus, mostly HPV-16, in 80% of cases. Conclusions.
    The distribution of α- and γ-HPV, but not β-HPV, seems to vary based on
    sociodemographic and behavioral characteristics. We did not observe the
    presence of cutaneous HPV in tumor tissues. © The Author(s) 2023. Published
    by Oxford University Press on behalf of Infectious Diseases Society of
    America. All rights reserved.
