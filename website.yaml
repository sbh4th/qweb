- id: socha2026a
  abstract: >-
    Purpose To improve the identification of cerebral palsy cases in
    administrative health data. Methods We included all children in a
    population-based cerebral palsy registry in Quebec, Canada, born from 1999
    through 2002, and a sample of children without cerebral palsy.
    Population-based hospitalization and physician billing records through 2012
    were obtained for all children. We used logistic regression to model the
    probability of cerebral palsy, using International Classification of
    Diseases codes for related diseases. We reported receiver operating
    characteristic (ROC) and precision-recall (PR) curves, and compared the
    accuracy to that of existing algorithms. We also reported the accuracy of
    cerebral palsy codes by age, data source, and gestational age at birth.
    Results The area under the ROC and PR curves of our model were 0.98 (95 %
    CI: 0.97–0.99) and 0.73 (95 % CI: 0.63–0.79), respectively. Cut-offs with a
    similar specificity to existing algorithms yielded sensitivities that were
    1–14 %age-points higher. The sensitivity of cerebral palsy codes was higher
    (and the specificity was lower) with longer follow-up times since birth,
    when using both hospitalization and billing records, and among children born
    preterm. Conclusions Our model improved identification of cerebral palsy
    cases in administrative data, but residual misclassification remained. ©
    2026 The Authors.
