- id: richardson2025
  abstract: >-
    Loneliness is highly prevalent and can have severe health consequences.
    While generally assumed to increase with age, some evidence suggests the
    relationship between age and loneliness may vary across country. In this
    study, we investigate the contribution of demographic and health factors to
    age-related inequalities in loneliness both within and across countries. We
    used population-based cross-sectional data from 64,324 older adults (age
    range: 50–90 years) across 29 countries. Loneliness was measured with the 3
    item UCLA loneliness scale. We quantified the magnitude of age inequalities
    in loneliness using concentration indices, and we estimated the contribution
    of demographic and health factors to age inequalities in loneliness using a
    decomposition approach. Loneliness was generally more concentrated among the
    oldest adults in the sample, although in the US and the Netherlands it was
    more concentrated among younger adults. Top contributors to age inequalities
    in loneliness were being unmarried and not working; however, the amount that
    factors contributed to inequalities differed markedly by country. Age
    inequalities in loneliness, and contributors to these inequalities, vary
    substantially across countries, suggesting that loneliness is not an
    inevitable consequence of age but may instead be shaped by environments
    within countries (e.g. social cohesion).
